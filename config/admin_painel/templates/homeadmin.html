{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>
    <link rel="stylesheet" href="{% static 'admin.css' %}">
</head>
<body>

    <header class="header">
        <h1>Painel Administrativo</h1>
    </header>

    <main class="container">
        
        <div class="card">
            <h2>Livros</h2>
            <p class="number">{{qnts_livros}}</p>
            <a class="btn" href="{% url 'manlivro' %}">Gerenciar</a>
        </div>

        <div class="card">
            <h2>Usuários</h2>
            <p class="number">{{qnts_usuarios}}</p>
            <a class="btn" href="{% url 'manusuario' %}">Gerenciar</a>
        </div>

        <div class="card">
            <h2>Empréstimos</h2>
            <p class="number">{{qnts_emprestimos}}</p>
            <a class="btn" href="{% url 'manemprestimo' %}">Gerenciar</a>
        </div>

    </main>

</body>
</html>
