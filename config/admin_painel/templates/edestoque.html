{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Estoque</title>
    <link rel="stylesheet" href="{% static 'edestoque.css' %}">
</head>
<body>

    <header class="header">
        <a href="{% url 'manlivro' %}" class="back-btn">← Voltar</a>
        <h1>Editar Estoque</h1>
    </header>

    <main class="container">

        <div class="card">
            <h2>Atualizar quantidade</h2>

            <form action="" method="post">
                {% csrf_token %}

                <input type="number" name="quantidade" placeholder="Nova quantidade..." min="0" required>

                <button type="submit" class="btn">
                    Atualizar
                </button>
            </form>

            {% if detail %}
                <p class="message">{{detail}}</p>
            {% endif %}
        </div>

    </main>

</body>
</html>
